name: Cleanup stuck Pages deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-stuck-pages-deployments.yml

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stuck GitHub Pages deployments inactive and delete failed records
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          deployments="$(
            curl --fail-with-body -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments?environment=github-pages&per_page=20"
          )"

          echo "${deployments}" | jq -r '.[] | [.id, .sha] | @tsv' | while IFS=$'\t' read -r deployment_id sha; do
            statuses="$(
              curl --fail-with-body -sS \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses"
            )"
            latest_state="$(echo "${statuses}" | jq -r '.[0].state // "none"')"

            if [ "${latest_state}" = "success" ]; then
              echo "Keeping successful deployment ${deployment_id} (${sha})"
              continue
            fi

            echo "Marking deployment ${deployment_id} (${sha}, ${latest_state}) inactive"
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses" \
              -d '{"state":"inactive","environment":"github-pages","description":"Mark stuck GitHub Pages deployment inactive"}'
            echo

            echo "Deleting deployment ${deployment_id}"
            curl --fail-with-body -sS \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments/${deployment_id}"
            echo
          done
