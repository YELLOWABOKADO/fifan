name: Cleanup stuck Pages deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-stuck-pages-deployments.yml

permissions:
  contents: read
  deployments: write
  pages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stuck GitHub Pages deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          for deployment_ref in \
            bec09b2dd4c2ab7deae7211a9e938dccd4ab23cc \
            52bdf4c40a73f86ed0db310d6b44eb5d65476aab \
            d2ef8cb5089792a4411946ca23648da9d37b152e \
            11975cf70ef04d0742a7432af4c46a02f8652915
          do
            echo "Cancelling Pages deployment ${deployment_ref}"
            status_code="$(
              curl -sS -o cancel-response.txt -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO}/pages/deployments/${deployment_ref}/cancel"
            )"
            cat cancel-response.txt
            echo

            if [ "${status_code}" = "204" ] || [ "${status_code}" = "404" ]; then
              continue
            fi

            echo "Unexpected cancel status ${status_code}"
            exit 1
          done

      - name: Mark stuck GitHub Pages deployments inactive and delete failed records
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          deployments="$(
            curl --fail-with-body -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments?environment=github-pages&per_page=20"
          )"

          echo "${deployments}" | jq -r '.[] | [.id, .sha] | @tsv' | while IFS=$'\t' read -r deployment_id sha; do
            statuses="$(
              curl --fail-with-body -sS \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses"
            )"
            latest_state="$(echo "${statuses}" | jq -r '.[0].state // "none"')"

            if [ "${latest_state}" = "success" ]; then
              echo "Keeping successful deployment ${deployment_id} (${sha})"
              continue
            fi

            echo "Marking deployment ${deployment_id} (${sha}, ${latest_state}) inactive"
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses" \
              -d '{"state":"inactive","environment":"github-pages","description":"Mark stuck GitHub Pages deployment inactive"}'
            echo

            echo "Deleting deployment ${deployment_id}"
            curl --fail-with-body -sS \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments/${deployment_id}"
            echo
          done

      - name: Request fresh GitHub Pages build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages/builds"
