name: Cleanup stuck Pages deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-stuck-pages-deployments.yml

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stuck GitHub Pages deployments inactive
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          for deployment_id in 5362531856 5362739312; do
            echo "Marking deployment ${deployment_id} inactive"
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses" \
              -d '{"state":"inactive","environment":"github-pages","description":"Mark stuck GitHub Pages deployment inactive"}'
            echo
          done
